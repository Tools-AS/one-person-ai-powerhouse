<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Become a One-Person AI Powerhouse — Live Workshop</title>
    <meta name="description" content="A 2-hour live workshop, Thursday July 2. Walk out a one-person machine — most people 5–10x their output." />
    <style>
      html, body { margin: 0; background: #000; }
      .wrap { width: min(100%, 480px); margin: 0 auto; position: relative; line-height: 0; }
      .page { display: block; width: 100%; }
      .claim {
        position: absolute; left: 8.5%; top: 91.4%; width: 83%; height: 5%;
        cursor: pointer; border-radius: 6px; background: transparent; display: block;
      }
      .claim:focus-visible { outline: 2px solid #00f2ff; outline-offset: 2px; }

  </head>
  <body>
    <main class="wrap">
      <img class="page" src="signup_final2.png" alt="Become a One-Person AI Powerhouse — paid live workshop, Thursday July 2, 12 PM PT / 3 PM ET, 2 hours, $300. What it's worth, what you'll learn, built for, the outcome." />
      <a class="claim" id="claim" href="#" rel="noopener" aria-label="Claim your seat — $300"></a>
    </main>
    <script>
      var STRIPE_LINK = "";
      document.getElementById("claim").addEventListener("click", function (e) {
        e.preventDefault();
        if (STRIPE_LINK) { window.location.href = STRIPE_LINK; }
        else { alert("Checkout is being connected — one moment."); }
      });
    </script>
  </body>
</html>
